services:
  app:
    build: .
    environment:
      - PYTHONUNBUFFERED=1
    ports:
      - "${APP_PORT}:8000"
    volumes:
      - .:/app
    # On dit à Docker d'envoyer la console (stdout) vers Logstash
    logging:
      driver: gelf
      options:
        gelf-address: "udp://127.0.0.1:5000"
    networks:
      - elk_network
    depends_on:
      logstash:
        condition: service_healthy
      elasticsearch:
        condition: service_started

  elasticsearch:
    image: elasticsearch:8.19.13
    environment:
      - discovery.type=single-node
      - xpack.security.enabled=false
      - xpack.security.http.ssl.enabled=false
      - xpack.security.transport.ssl.enabled=false
      - cluster.routing.allocation.disk.threshold_enabled=false
      - ES_JAVA_OPTS=-Xms512m -Xmx512m
    ports:
      - "${ELASTIC_PORT}:9200"
    networks:
      - elk_network

  setup-elastic:
    image: curlimages/curl:8.1.0
    networks:
      - elk_network
    depends_on:
      - elasticsearch
    entrypoint: >
      sh -c "
        echo 'Waiting for Elasticsearch...';
        while ! curl -s http://elasticsearch:9200 >/dev/null; do sleep 2; done;
        curl -X PUT 'http://elasticsearch:9200/_template/all_indices' -H 'Content-Type: application/json' -d '{
          \"index_patterns\": [\"*\"],
          \"settings\": { \"number_of_replicas\": 0 }
        }';
        curl -X PUT 'http://elasticsearch:9200/_all/_settings' -H 'Content-Type: application/json' -d '{
          \"index.blocks.read_only_allow_delete\": null
        }';
        echo 'Configuration complete!';"

  logstash:
    image: logstash:8.19.13
    volumes:
      - ./logstash.conf:/usr/share/logstash/pipeline/logstash.conf:ro
    # On ouvre le port 5000 en UDP pour recevoir les logs de l'app
    ports:
      - "5000:5000/udp"
    depends_on:
      - elasticsearch
      - setup-elastic
    networks:
      - elk_network
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9600"]
      interval: 5s
      timeout: 5s
      retries: 5

  kibana:
    image: kibana:8.19.13
    environment:
      - ELASTICSEARCH_HOSTS=http://elasticsearch:9200
      - I18N_LOCALE=fr-FR # Pour avoir l'interface en français
    ports:
      - "${KIBANA_PORT}:5601"
    networks:
      - elk_network
    depends_on:
      - elasticsearch

networks:
  elk_network:
    driver: bridge
